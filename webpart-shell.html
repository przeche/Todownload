<style>
  /* Lock host page and SharePoint containers from generating window-level scrollbars */
  html, body, #s4-workspace {
    margin: 0 !important;
    padding: 0 !important;
    height: 100% !important;
    width: 100% !important;
    overflow: hidden !important;
  }

  * { box-sizing: border-box; }

  #root {
    width: 100% !important;
    height: 100% !important;
    overflow: hidden !important;
  }

  /* Force sidebar header ("Project · ID · Manager · Cluster") to stay sticky at top with calendar header */
  #root > div > div:nth-child(3) > div > div:first-child > div:first-child {
    position: sticky !important;
    top: 0 !important;
    z-index: 25 !important;
  }

  /* Custom styled scrollbars for the timeline grid container */
  #root ::-webkit-scrollbar {
    width: 8px;
    height: 10px;
  }
  #root ::-webkit-scrollbar-track {
    background: #f1f5f9;
  }
  #root ::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 5px;
  }
  #root ::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
  }

  /* Re-assert absolute positioning on floating milestone icon buttons */
  #root button[style*="absolute"] {
    position: absolute !important;
  }

  /* Prevent host-page min-width/min-height rules from stretching circular icon buttons */
  #root button {
    min-width: 0 !important;
    min-height: 0 !important;
  }

  /* SharePoint classic layout table horizontal width fix */
  table#layoutsTable {
    width: 100% !important;
    max-width: 100vw !important;
    table-layout: fixed !important;
  }

  .CanvasZone, .ControlZone, .CanvasComponent {
    max-width: 100% !important;
  }
</style>

<div id="root"></div>

<script>
(function(){
  document.addEventListener('submit', function(e){
    var root = document.getElementById('root');
    if (root && root.contains(e.target)) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  var root = document.getElementById('root');
  if (!root) return;

  function disown(el){
    var t = el.tagName;
    if (t === 'BUTTON' || t === 'INPUT' || t === 'SELECT' || t === 'TEXTAREA') {
      if (!el.hasAttribute('form')) el.setAttribute('form', '__oh_no_form__');
    }
  }
  function scan(node){
    if (!node || node.nodeType !== 1) return;
    disown(node);
    var els = node.querySelectorAll('button, input, select, textarea');
    for (var i = 0; i < els.length; i++) disown(els[i]);
  }

  scan(root);
  var mo = new MutationObserver(function(mutations){
    for (var i = 0; i < mutations.length; i++) {
      var added = mutations[i].addedNodes;
      for (var j = 0; j < added.length; j++) scan(added[j]);
    }
  });
  mo.observe(root, { childList: true, subtree: true });

  // Size the app to fit exact available height below SharePoint top ribbon/nav
  function fitToViewport(){
    var appEl = root.firstElementChild;
    if (!appEl) return;
    var rect = root.getBoundingClientRect();
    var chromeAbove = Math.max(0, rect.top);
    var viewportH = window.innerHeight || document.documentElement.clientHeight;
    var availH = Math.max(200, viewportH - chromeAbove);
    appEl.style.height = availH + 'px';
    appEl.style.maxHeight = availH + 'px';
  }

  var fitTimer = setInterval(function(){
    if (root.firstElementChild) fitToViewport();
  }, 200);
  window.addEventListener('resize', fitToViewport);
  window.addEventListener('load', fitToViewport);
})();
</script>
